[build]
builder = "nixpacks"

# force python 3.11 so nixpacks doesnt pick a random version
[build.env]
NIXPACKS_PYTHON_VERSION = "3.11"

# pre-download the ML model at build time so it's baked into the image
# otherwise it downloads on every cold start which is slow af on free tier
[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')\""
]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
